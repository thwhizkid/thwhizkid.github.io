<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="1.css" />
  </head>

  <body>
    <div class="container">
      <div class="calculator">
        <div class="screen">0</div>
        <div class="buttons">
          <button id="clear" class="clear" value="C">C</button>
          <button id="percent" class="percent" value="&radic;">&radic;</button>
          <button id="multiply" class="multiply" value="&times;">*</button>
          <button id="divide" value="&divide;">&divide;</button>

          <button id="seven" value="7">7</button>
          <button id="eight" value="8">8</button>
          <button id="nine" value="9">9</button>
          <button id="decimal" value=".">.</button>

          <button id="four" value="4">4</button>
          <button id="five" value="5">5</button>
          <button id="six" value="6">6</button>
          <button id="subtract" value="-">-</button>

          <button id="one" value="1">1</button>
          <button id="two" value="2">2</button>
          <button id="three" value="3">3</button>
          <button id="plus" class="plus" value="+">+</button>

          <button id="zero" class="zero" value="0">0</button>
          <button id="equal" value="=">=</button>
        </div>
      </div>
    </div>

    <script src="1.js"></script>
  </body>
</html>
